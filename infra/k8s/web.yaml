apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: commit-msg
  labels:
    app: web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/muhammadh01/commit-msg-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: API_URL
              value: "http://api.commit-msg.svc.cluster.local"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: commit-msg
  labels:
    app: web
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 3000
